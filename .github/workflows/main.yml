name: Test and Build

on:
  push:
    branches:
      - master
    paths:
      - "**/*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup python
        uses: actions/setup-python@v2
        with:
          python-version: "3.9"

      - name: Docker Setup
        uses: docker/setup-buildx-action@v2

      # Testing the code
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run Linting Tests
        run: |
          flake8 --ignore=E501,F401 .

      - name: Docker Credentials
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Tag
        id: version
        run: |
          VERSION=v$(date +"%Y%m%d%H%M%S")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/weather-app:${{ env.VERSION }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/weather-app:${{ env.VERSION }}

      # Update the K8s Manifest Files
      - name: Update K8s Manifest Files
        run: |
          sed -i 's|image: <Image>|image: ${{ secrets.DOCKER_USERNAME }}/weather-app:${{ env.VERSION }}|g' k8s/deploy.yml

      - name: Commit the changes
        run: |
          git config --global user.name "Github Action"
          git config --global user.email "<>"
          git add k8s/deploy.yml
          git commit -m "Update image version to ${{ env.VERSION }}"
          git push -u origin master
